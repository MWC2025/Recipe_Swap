name: Manual workflow for docker

on:
  workflow_dispatch:

jobs:
  check-node:
    runs-on: ubuntu-latest

    steps:
      - name: Check first step
        run: echo "first job done!"

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check Node
        run: node --version
