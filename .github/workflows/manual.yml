name: Sprint 4 CI Check

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Node version
        run: node --version

      - name: Check npm version
        run: npm --version

      - name: Confirm app folder exists
        run: ls app

      - name: Confirm Docker files exist
        run: |
          test -f app/docker-compose.yml
          test -f app/Dockerfile